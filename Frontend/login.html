{% extends "base.html" %}

{% block title %}Login - Online Vegetable Shop{% endblock %}

{% block content %}
<div class="form-container">
    <h2>🔐 Login to Your Account</h2>
    
    <div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;">
        <button type="button" id="userLoginBtn" class="btn btn-primary" style="flex:1;" onclick="switchLoginType('user')">User Login</button>
        <button type="button" id="adminLoginBtn" class="btn" style="flex:1;background:#6c757d;color:white;" onclick="switchLoginType('admin')">Admin Login</button>
    </div>
    
    <form method="POST" id="loginForm">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div style="position:relative;">
                <input type="password" id="password" name="password" required style="padding-right:40px;">
                <span id="togglePassword" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:1.2rem;">👁️</span>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary" style="flex:1;">Login</button>
        </div>
    </form>
    <p style="text-align:center;margin-top:1rem;">
        Don't have an account? <a href="{{ url_for('register') }}">Register here</a>
    </p>
</div>

<script>
let loginType = 'user';

function switchLoginType(type) {
    event.preventDefault();
    loginType = type;
    const userBtn = document.getElementById('userLoginBtn');
    const adminBtn = document.getElementById('adminLoginBtn');
    const emailInput = document.getElementById('email');
    
    if (type === 'admin') {
        adminBtn.className = 'btn btn-primary';
        adminBtn.style.flex = '1';
        userBtn.className = 'btn';
        userBtn.style.flex = '1';
        userBtn.style.background = '#6c757d';
        userBtn.style.color = 'white';
        emailInput.value = 'admin@ovs.com';
    } else {
        userBtn.className = 'btn btn-primary';
        userBtn.style.flex = '1';
        userBtn.style.background = '';
        userBtn.style.color = '';
        adminBtn.className = 'btn';
        adminBtn.style.flex = '1';
        adminBtn.style.background = '#6c757d';
        adminBtn.style.color = 'white';
        emailInput.value = '';
    }
}

document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('password');
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    this.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
});
</script>
{% endblock %}
