{% extends "base.html" %}

{% block title %}Register - Online Vegetable Shop{% endblock %}

{% block content %}
<div class="form-container">
    <h2>📝 Create Your Account</h2>
    <form method="POST">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" required>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <div style="position:relative;">
                <input type="password" id="password" name="password" required style="padding-right:40px;">
                <span id="togglePassword" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:1.2rem;">👁️</span>
            </div>
        </div>
        <div class="form-group">
            <label for="confirm_password">Confirm Password</label>
            <div style="position:relative;">
                <input type="password" id="confirm_password" name="confirm_password" required style="padding-right:40px;">
                <span id="toggleConfirmPassword" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:1.2rem;">👁️</span>
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary" style="flex:1;">Register</button>
        </div>
    </form>
    <p style="text-align:center;margin-top:1rem;">
        Already have an account? <a href="{{ url_for('login') }}">Login here</a>
    </p>
</div>

<script>
document.getElementById('togglePassword').addEventListener('click', function() {
    const passwordInput = document.getElementById('password');
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    this.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
});

document.getElementById('toggleConfirmPassword').addEventListener('click', function() {
    const confirmPasswordInput = document.getElementById('confirm_password');
    const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    confirmPasswordInput.setAttribute('type', type);
    this.textContent = type === 'password' ? '👁️' : '👁️‍🗨️';
});
</script>
{% endblock %}
